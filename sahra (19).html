<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg: #1B1E27; --bg-deep:#14161D; --card:#22252F; --card-2:#2B2F3B;
    --amber:#C9A227; --amber-dim:#3E3418; --violet:#2FA894; --coral:#B8564A; --green:#2FA894;
    --red:#B8564A; --text:#F0EDE4; --text-dim:#8A8F9E; --line:#343946;
    --grad: #C9A227; --beige:#F0EDE4; --beige-dim:#8A8F9E; --accent-text: var(--amber);
  }
  html[data-theme="light"]{
    --bg: #FAF8F3; --bg-deep:#F3F0E8; --card:#FFFFFF; --card-2:#F1EDE2;
    --amber:#A8790C; --amber-dim:#F0E3BE; --violet:#1F8A78; --coral:#A8453B; --green:#1F8A78;
    --red:#A8453B; --text:#201F1A; --text-dim:#6C6A5E; --line:#E4DFD0;
    --grad: #A8790C; --beige:#201F1A; --beige-dim:#6C6A5E; --accent-text: var(--amber);
  }
  html[data-theme="light"] #modalOverlay{background:rgba(30,28,20,.55);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--bg-deep);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3{font-family:'Lalezar','Tajawal',sans-serif;font-weight:400;margin:0;}
  .wrap{max-width:820px;margin:0 auto;padding:16px 14px calc(90px + env(safe-area-inset-bottom));}
  .topbar{ margin-bottom:18px; }
  .trip-name-field{ margin-bottom:12px; }
  .trip-name{
    font-size:22px; color:var(--amber); font-family:'Lalezar','Tajawal',sans-serif;
    outline:none; width:100%; display:block; background:var(--card);
    border:1.5px solid var(--line); border-radius:12px; padding:12px 14px;
  }
  .trip-name:focus{ border-color:var(--amber); }
  .who-am-i-row{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); flex-wrap:wrap; }
  .who-am-i{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);}
  select,input[type=text],input[type=number],input[type=date],input[type=tel],textarea{
    font-family:'Tajawal',sans-serif;background:var(--bg);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font-size:16px;outline:none;min-height:44px;
  }
  textarea{min-height:70px;}
  select:focus,input:focus,textarea:focus{border-color:var(--violet);}
  button{font-family:'Tajawal',sans-serif;cursor:pointer;border-radius:10px;padding:11px 16px;font-size:14px;
    font-weight:500;border:1px solid var(--line);background:var(--card-2);color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;
    -webkit-tap-highlight-color:transparent;outline:none;}
  button:active{transform:scale(.97);}
  button:hover,button:focus,button:focus-visible,button:active{color:inherit;}
  button:focus-visible{box-shadow:0 0 0 3px var(--accent-text);}
  #themeToggleBtn{color:var(--accent-text)!important;}
  #themeToggleBtn:hover,#themeToggleBtn:focus,#themeToggleBtn:active{color:var(--accent-text)!important;}
  #themeToggleBtn:focus-visible{box-shadow:0 0 0 3px var(--accent-text);}
  button.primary{background:var(--grad);color:#14161D;border:none;font-weight:700;}
  button.primary:hover,button.primary:focus,button.primary:active{color:#14161D;}
  button.primary .icon{color:#14161D;}
  button.danger{border-color:var(--red);color:var(--red);background:none;}
  button.danger:hover,button.danger:focus,button.danger:active{color:var(--red);}
  button.ghost{background:none;}
  button.sm{padding:8px 12px;font-size:13px;min-height:38px;}
  .file-btn{font-family:'Tajawal',sans-serif;cursor:pointer;border-radius:10px;padding:11px 16px;font-size:14px;
    font-weight:500;border:1px solid var(--line);background:var(--card-2);color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;white-space:nowrap;}
  .file-btn.sm{padding:8px 12px;font-size:13px;min-height:38px;}
  .file-btn:active{transform:scale(.97);}
  .icon{width:16px;height:16px;flex-shrink:0;vertical-align:-3px;color:var(--accent-text);}
  .tabs{display:flex;flex-wrap:wrap;gap:0;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:0;}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;border-radius:0;padding:10px 12px;
    color:var(--text-dim);white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:5px;
    min-height:44px;flex-shrink:0;font-size:13.5px;}
  @media(max-width:480px){
    .tabs{border-bottom:none;}
    .tab-btn{padding:9px 10px;font-size:12.5px;gap:4px;border-bottom:2px solid transparent;border-top:none;}
  }
  @media(min-width:481px){
    .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
  }
  .tab-btn.active{color:var(--accent-text);border-color:var(--accent-text);font-weight:700;}
  .tab-btn{position:relative;}

const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage !== null);
const LS_PREFIX = 'sahra:';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyArcf7JKyiv6wL1eKLyiB5WCTZG7kxhqng",
  authDomain: "sahra-67126.firebaseapp.com",

  messagingSenderId: "737846079703",
  appId: "1:737846079703:web:c6eca57860a0f4e9b54092"
};
let firebaseDb = null;
let HAS_FIREBASE = false;
try{
  if(!HAS_CLAUDE_STORAGE && typeof firebase !== 'undefined'){
    firebase.initializeApp(FIREBASE_CONFIG);
    firebaseDb = firebase.firestore();
    HAS_FIREBASE = true;
  }
}catch(e){ console.error('تعذر تهيئة Firebase', e); HAS_FIREBASE = false; }

async function storageGet(key, shared){
  if(HAS_CLAUDE_STORAGE) return window.storage.get(key, shared);
  if(shared && HAS_FIREBASE){
    const doc = await firebaseDb.collection('sahra_kv').doc(key).get();
    if(!doc.exists) throw new Error('not found');
    return { key, value: doc.data().value, shared };
  }
  const raw = localStorage.getItem(LS_PREFIX + key);
  if(raw === null) throw new Error('not found');
  return { key, value: raw, shared };
}
async function storageSetRaw(key, value, shared){
  if(HAS_CLAUDE_STORAGE) return window.storage.set(key, value, shared);
  if(shared && HAS_FIREBASE){
    await firebaseDb.collection('sahra_kv').doc(key).set({ value });
    return { key, value, shared };
  }
  localStorage.setItem(LS_PREFIX + key, value);
  return { key, value, shared };
}

async function storageSetRetry(key, value, shared, attempts){
  attempts = attempts || 3;
  let lastErr;
  for(let i=0; i<attempts; i++){
    try{
      const res = await storageSetRaw(key, value, shared);
      return res;
    }catch(e){
      lastErr = e;
      if(i < attempts-1) await new Promise(r=>setTimeout(r, 400*(i+1)));
    }
  }
  throw lastErr;
}

function requestNotifPermission(){
  if(typeof Notification === 'undefined'){ notifPermission='unsupported'; render(); return; }
  Notification.requestPermission().then(p=>{ notifPermission = p; render(); });
}
function playNotifSound(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
    o.start(); o.stop(ctx.currentTime+0.35);
  }catch(e){}
}
function showNotif(title, body){
  hasNewNotif = true;
  if(notifPermission === 'granted' && typeof Notification !== 'undefined'){
    try{ new Notification(title, { body }); }catch(e){}

  playNotifSound();
  render();
}

  if(!unlocked || !currentTripId) return;

    const res = await storageGet(tripDataKey(currentTripId), true);

    if(fresh.deleted) return;
    fresh.occasions.forEach(o=>{
      const prev = lastKnownInviteSent[o.id];
      if(o.inviteSent && prev === false){
        showNotif('دعوة جديدة 📣', (o.inviteMessage || 'وصلتكم دعوة لطلعة جديدة').slice(0,90));
      }
      lastKnownInviteSent[o.id] = !!o.inviteSent;
    });
    state = normalizeState(fresh);

  }catch(e){}
}

function localISO(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }

function resizeImage(file, maxDim, quality, cb){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxDim){ h=h*maxDim/w; w=maxDim; } } else { if(h>maxDim){ w=w*maxDim/h; h=maxDim; } }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function memberName(id){ const m=state.members.find(x=>x.id===id); return m?m.name:'عضو محذوف'; }
function memberById(id){ return state.members.find(x=>x.id===id); }
function pairById(id){ return state.hostPairs.find(x=>x.id===id); }
function pairLabel(pairId){
  const p = pairById(pairId); if(!p) return 'غير محدد';
  return p.memberIds.map(memberName).join(' و ');
}
function intervalDays(){ return state.frequency==='weekly'?7:state.frequency==='biweekly'?14:0; }
function nextDate(iso){
  if(state.frequency==='monthly') return addMonths(iso,1);
  // Always advance by interval, then snap to preferred weekday to prevent drift
  const advanced = addDays(iso, intervalDays());
  return nextOccurrenceOfWeekday(advanced, state.preferredWeekday);
}
function nextOccurrenceOfWeekday(fromIso, weekday){
  let d = new Date(fromIso+'T12:00:00');
  while(d.getDay() !== weekday) d.setDate(d.getDate()+1);
  return localISO(d);
}
function isExcluded(iso){
  return state.excludedPeriods.some(p => iso >= p.start && iso <= p.end);
}

function generateYearSchedule(){
  if(state.hostPairs.length===0){ showAlert('كوّن المعازيب أولاً من تبويب الأعضاء'); return; }
  showConfirm('سيتم حذف الجدول الحالي وتوليد جدول سنة كاملة جديدة. متأكد؟', ()=>{
    state.occasions = [];
    let date = nextOccurrenceOfWeekday(state.scheduleStartDate, state.preferredWeekday);
    const endDate = addMonths(date, 12);
    let pairIdx = 0, index = 0, guard = 0;
    while(date < endDate && guard < 400){
      guard++;
      if(!isExcluded(date)){
        state.occasions.push({
          id: uid(), index, date,
          hostPairId: state.hostPairs[pairIdx % state.hostPairs.length].id,
          status:'scheduled', location:'',
          inviteType:null, inviteMessage:'', inviteAutoGenerated:true, inviteSent:false, responses:{},
          cancelReason:'', apologyMessage:'', postponeMessage:'', postponeSent:false, pendingNewDate:'', locationMapLink:'',
          hasPhoto:false, photoDate:'',
          kitty:{ attendees:[], total:0, paid:{} },
          rating:{ raters:{} }
        });
        pairIdx++; index++;
      }
      date = nextDate(date);
    }
    saveState(); render();
  });
}

function tryBrowserGeolocation(timeoutMs){
  return new Promise(resolve=>{
    if(typeof navigator === 'undefined' || !('geolocation' in navigator)){ resolve(null); return; }
    let done = false;
    const finish = (val)=>{ if(!done){ done = true; resolve(val); } };
    const timer = setTimeout(()=>finish(null), timeoutMs || 4000);
    try{
      navigator.geolocation.getCurrentPosition(
        pos=>{ clearTimeout(timer); finish({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }); },
        ()=>{ clearTimeout(timer); finish(null); },
        { timeout: timeoutMs || 4000, maximumAge: 600000 }
      );
    }catch(e){ clearTimeout(timer); finish(null); }
  });
}
async function tryGeocode(query, lang){
  try{
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=${lang||'ar'}&format=json`);
    const geoData = await geoRes.json();
    if(geoData.results && geoData.results.length) return geoData.results[0];
  }catch(e){ console.warn('تعذر البحث الجغرافي:', e); }
  return null;
}
async function fetchWeatherForOccasion(occ){
  try{
    let place = await tryBrowserGeolocation(4000);
    if(!place){
      const loc = (occ.location||'').trim();
      if(!loc) return null;
      place = await tryGeocode(loc, 'ar');
      if(!place) place = await tryGeocode(loc, 'en');
      if(!place) place = await tryGeocode(loc + '، السعودية', 'ar');
      if(!place){
        const firstWord = loc.split(/\s+/)[0];
        if(firstWord && firstWord !== loc){
          place = await tryGeocode(firstWord, 'ar') || await tryGeocode(firstWord, 'en');
        }
      }
    }
    if(!place){ console.warn('تعذر تحديد إحداثيات الموقع:', occ.location); return null; }
    const { latitude, longitude } = place;
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${occ.date}&end_date=${occ.date}`);
    const wData = await wRes.json();
    if(!wData.daily || !wData.daily.time || !wData.daily.time.length){
      console.warn('لا يوجد توقعات طقس متاحة لهذا التاريخ (قد يكون بعيد جدًا):', occ.date);
      return null;
    }
    const tmax = Math.round(wData.daily.temperature_2m_max[0]);
    const tmin = Math.round(wData.daily.temperature_2m_min[0]);
    const info = weatherInfoFor(wData.daily.weathercode[0]);
    return { tmax, tmin, ...info };
  }catch(e){ console.warn('خطأ أثناء جلب الطقس:', e); return null; }
}
function buildWeatherInvite(occ, weather){
  const hosts = pairLabel(occ.hostPairId);
  const dayLine = fmtDate(occ.date);
  const timeStr = state.occasionTime ? formatTime12(state.occasionTime) : '';
  let msg = `🌙 الله يمسيكم بالخير يا قروبنا العزيز\n`;
  msg += `📅 الله يحييكم على الطلعة الدورية يوم ${dayLine}${timeStr ? ' — الساعة '+timeStr : ''}\n`;
  msg += `🏠 على شرف المعازيب ${hosts}\n`;
  if(occ.location && occ.location.trim()) msg += `📍 في ${occ.location}\n`;
  if(weather){
    msg += `${weather.icon} وترا درجة الحرارة احتمال تكون بين ${weather.tmin}° و${weather.tmax}°م، والجو ${weather.text} إن شاء الله\n`;
    msg += `🤲 والعلم عند الله\n`;
  }
  msg += `\nوسلامتكم 👋`;
  if(occ.locationMapLink && occ.locationMapLink.trim()) msg += `\n\n📍 الموقع: ${occ.locationMapLink.trim()}`;
  return msg;
}
function formatTime12(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const period = h >= 12 ? 'م' : 'ص';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}
function postponeText(occ, newDateISO){
  const reason = occ.cancelReason ? occ.cancelReason : 'ظرف طارئ';
  const dateLine = newDateISO ? fmtDate(newDateISO) : 'يبلّغكم المعازيب فيه لاحقًا';

}

      <button class="sm ghost" id="backToChooseBtn" style="width:100%;justify-content:center;">رجوع</button>
    </div>`;
  }
  if(landingMode === 'select'){
    return `<div class="card" style="max-width:360px;margin:60px auto;text-align:center;">
      <div style="display:flex;justify-content:center;color:var(--accent-text);margin-bottom:6px;">${icon('key')}</div><h2 style="color:var(--accent-text);margin-bottom:6px;">الدخول لطلعة</h2>
      <div style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">اكتب كود الطلعة</div>
      <input type="text" id="tripCodeInput" placeholder="كود الطلعة" maxlength="6" inputmode="numeric" style="width:100%;text-align:center;font-size:18px;letter-spacing:4px;margin-bottom:10px;">
      <button class="primary" id="findTripBtn" style="width:100%;margin-bottom:8px;justify-content:center;">${icon('lock')}تحقق من الكود</button>
      <div id="lockError" style="color:var(--red);font-size:12.5px;margin:8px 0;">${esc(landingError)}</div>
      <button class="sm ghost" id="backToChooseBtn" style="width:100%;justify-content:center;">رجوع</button>
    </div>`;

  if(landingMode === 'memberLogin' && landingFoundTrip){
    const data = landingFoundTrip.data;
    if(landingTripAdminMode){
      return `<div class="card" style="max-width:360px;margin:60px auto;text-align:center;">
        <div style="display:flex;justify-content:center;color:var(--accent-text);margin-bottom:6px;">${icon('settings')}</div>
        <h2 style="color:var(--accent-text);margin-bottom:4px;">${esc(data.tripName)}</h2>
        <div style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">الدخول كمسؤول الطلعة</div>
        <label class="field-label" for="tripAdminCodeInput" style="text-align:right;">كود الإدارة الخاص فيك</label>
        <input type="text" id="tripAdminCodeInput" placeholder="كود الإدارة" maxlength="6" inputmode="numeric" style="width:100%;text-align:center;font-size:18px;letter-spacing:4px;margin-bottom:10px;">
        <button class="primary" id="tripAdminLoginBtn" style="width:100%;margin-bottom:8px;justify-content:center;">${icon('lock')}دخول</button>
        <div id="memberLoginError" style="color:var(--red);font-size:12.5px;margin:8px 0;">${esc(landingError)}</div>

        <button class="sm ghost" id="backToChooseBtn" style="width:100%;justify-content:center;">رجوع</button>
      </div>`;

    return `<div class="card" style="max-width:360px;margin:60px auto;text-align:center;">
      <div style="display:flex;justify-content:center;color:var(--accent-text);margin-bottom:6px;">${icon('users')}</div>
      <h2 style="color:var(--accent-text);margin-bottom:4px;">${esc(data.tripName)}</h2>
      <div style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">اختر اسمك وأدخل رقم جوالك</div>

          </div>
        </div>`;

        <div class="row" style="gap:6px;">
          <button class="sm" data-admin-msg="${escAttr(t.id)}" data-admin-msg-name="${escAttr(t.name)}">${icon('bell')}رسالة</button>
          <button class="sm danger" data-admin-del="${escAttr(t.id)}">حذف</button>
        </div>
      </div>`;
      }).join('') || '<div class="empty">ما فيه طلعات مسجّلة</div>'}

        </div>
      </div>

    </div>`;

function attachLandingEvents(){
  const backToChooseBtn = document.getElementById('backToChooseBtn');
  if(backToChooseBtn){
    backToChooseBtn.addEventListener('click', ()=>{ landingMode='choose'; landingError=''; landingFoundTrip=null; landingTripAdminMode=false; adminMode=false; render(); });
  }
  if(landingMode === 'create'){
    document.getElementById('createTripBtn').addEventListener('click', ()=>{
      const name = document.getElementById('newTripNameInput').value.trim();
      if(!name) return;
      createNewTrip(name);
    });
    setTimeout(()=>document.getElementById('newTripNameInput')?.focus(), 30);
    return;
  }
  if(landingMode === 'select'){
    const findTripBtn = document.getElementById('findTripBtn');
    const tryFind = async ()=>{
      const code = normalizeDigits(document.getElementById('tripCodeInput').value);
      if(!code){ landingError='اكتب كود الطلعة'; render(); return; }
      landingError = 'جارٍ التحقق...'; render();
      const match = tripsIndex.find(t=>t.code === code);
      if(!match){ landingError='ما فيه طلعة بهذا الكود'; render(); return; }
      try{
        const res = await storageGet(tripDataKey(match.id), true);
        const data = JSON.parse(res.value);
        if(data.tripCode !== code){ landingError='ما فيه طلعة بهذا الكود'; render(); return; }
        landingFoundTrip = { id: match.id, data: normalizeState(data) };
        landingMode = 'memberLogin'; landingError='';
        render();
      }catch(e){ landingError='تعذر العثور على بيانات هذي الطلعة'; render(); }
    };
    findTripBtn.addEventListener('click', tryFind);
    document.getElementById('tripCodeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryFind(); });
    setTimeout(()=>document.getElementById('tripCodeInput')?.focus(), 30);
    return;
  }
  if(landingMode === 'memberLogin'){
    const toggleBtn = document.getElementById('toggleTripAdminModeBtn');
    if(toggleBtn){
      toggleBtn.addEventListener('click', ()=>{ landingTripAdminMode = !landingTripAdminMode; landingError=''; render(); });
    }
    if(landingTripAdminMode){
      const tripAdminLoginBtn = document.getElementById('tripAdminLoginBtn');
      const tryTripAdminLogin = ()=>{
        const code = normalizeDigits(document.getElementById('tripAdminCodeInput').value);
        if(!code || landingFoundTrip.data.adminCode !== code){ landingError='كود الإدارة غير صحيح'; render(); return; }
        state = landingFoundTrip.data; currentTripId = landingFoundTrip.id; currentUserId = null; isTripAdmin = true;
        unlocked = true; landingError=''; landingFoundTrip = null; landingTripAdminMode = false;
        saveSession();
        startPolling();
        render();
      };
      tripAdminLoginBtn.addEventListener('click', tryTripAdminLogin);
      document.getElementById('tripAdminCodeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryTripAdminLogin(); });
      setTimeout(()=>document.getElementById('tripAdminCodeInput')?.focus(), 30);
      return;
    }
    const memberLoginBtn = document.getElementById('memberLoginBtn');
    const tryMemberLogin = ()=>{
      const mid = document.getElementById('memberLoginSelect').value;
      const code = normalizeDigits(document.getElementById('memberLoginCode').value);
      if(!mid){ landingError='اختر اسمك أولًا'; render(); return; }
      const m = landingFoundTrip.data.members.find(x=>x.id===mid);
      if(!m || m.code !== code){ landingError='رقم الجوال غير صحيح'; render(); return; }
      state = landingFoundTrip.data; currentTripId = landingFoundTrip.id; currentUserId = mid; isTripAdmin = false;
      unlocked = true; landingError=''; landingFoundTrip = null;
      saveSession();
      startPolling();
      render();
    };
    memberLoginBtn.addEventListener('click', tryMemberLogin);
    document.getElementById('memberLoginCode').addEventListener('keydown', e=>{ if(e.key==='Enter') tryMemberLogin(); });
    setTimeout(()=>document.getElementById('memberLoginSelect')?.focus(), 30);
    return;
  }
  if(landingMode === 'admin-login'){
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const tryAdminLogin = async ()=>{
      const code = normalizeDigits(document.getElementById('adminCodeInput').value);
      if(!code){ landingError='اكتب كود الإدارة'; render(); return; }
      landingError = 'جارٍ التحقق...'; render();
      const realCode = await getOrCreateAdminCode();
      if(code === realCode){
        adminMode = true; landingMode='admin-panel'; landingError='';
        loadAdminStats();
      } else { landingError='كود الإدارة غير صحيح'; render(); }
    };
    adminLoginBtn.addEventListener('click', tryAdminLogin);
    document.getElementById('adminCodeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryAdminLogin(); });
    setTimeout(()=>document.getElementById('adminCodeInput')?.focus(), 30);
    return;
  }
  if(landingMode === 'admin-panel'){
    document.querySelectorAll('[data-admin-del]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const tid = btn.getAttribute('data-admin-del');
        const t = tripsIndex.find(x=>x.id===tid);
        showConfirm(`حذف طلعة "${t ? t.name : ''}" نهائيًا؟ ما ينرجع بعدها.`, async ()=>{
          tripsIndex = tripsIndex.filter(x=>x.id!==tid);
          await saveTripsIndex();
          try{ await storageSetRetry(tripDataKey(tid), JSON.stringify({deleted:true}), true); }catch(e){}
          render();
        });
      });
    });
    document.querySelectorAll('[data-admin-msg]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const tid = btn.getAttribute('data-admin-msg');
        const tname = btn.getAttribute('data-admin-msg-name');
        showPrompt(`رسالة من النظام لأعضاء طلعة "${tname}":`, '', async (text)=>{
          text = text.trim();
          if(!text) return;
          try{
            const res = await storageGet(tripDataKey(tid), true);
            const fresh = normalizeState(JSON.parse(res.value));
            if(fresh.deleted) return;
            fresh.announcements.push({ id: uid(), text: `📢 رسالة من النظام:\n${text}`, createdAt: Date.now(), ackBy: {} });
            await storageSetRetry(tripDataKey(tid), JSON.stringify(fresh), true);
            showAlert('تم إرسال الرسالة لأعضاء الطلعة.');
          }catch(e){ showAlert('تعذر إرسال الرسالة، تأكد من اتصالك بالنت.'); }
        });
      });
    });
    const saveSupportPhoneBtn = document.getElementById('saveSupportPhoneBtn');
    if(saveSupportPhoneBtn){
      saveSupportPhoneBtn.addEventListener('click', async ()=>{
        const val = document.getElementById('adminSupportPhoneInput').value.replace(/\D/g,'');
        if(!val){ showAlert('أدخل رقم الجوال مع رمز الدولة (مثال: 966501234567)'); return; }
        try{
          await storageSetRetry('sahra-support-phone', val, true);
          supportPhone = val;
          loadSupportPhone();
          showAlert('تم حفظ رقم الواتساب ✅');
        }catch(e){ showAlert('تعذر الحفظ، تحقق من اتصالك'); }
      });
    }
    return;
  }
  const goSelectBtn = document.getElementById('goSelectBtn');
  if(goSelectBtn) goSelectBtn.addEventListener('click', ()=>{ landingMode='select'; landingError=''; render(); });
  document.getElementById('goCreateBtn').addEventListener('click', ()=>{ landingMode='create'; landingError=''; render(); });
  const adminLoginLinkBtn = document.getElementById('adminLoginLinkBtn');
  if(adminLoginLinkBtn) adminLoginLinkBtn.addEventListener('click', ()=>{ landingMode='admin-login'; landingError=''; render(); });
}

function render(){
  const app = document.getElementById('app');
  if(!unlocked){
    app.innerHTML = renderLanding();
    attachLandingEvents();
    return;
  }
  let html = '';
  html += `<div class="topbar">
    <div class="trip-name-field">
      <label class="field-label" for="tripNameInput">اسم الطلعة</label>
      <input class="trip-name" id="tripNameInput" value="${escAttr(state.tripName)}" placeholder="مثلاً: طلعة الشباب">
    </div>
    <div class="who-am-i-row">
      ${isTripAdmin ? `${icon('settings')} أنت مسجّل بصفة: <strong style="color:var(--amber);">مسؤول الطلعة</strong>
        <button class="sm ghost" id="logoutBtn">تسجيل خروج</button>`
      : currentUserId ? `أنت مسجّل بصفة: <strong style="color:var(--amber);">${esc(memberName(currentUserId))}</strong>
        <button class="sm ghost" id="logoutBtn">تسجيل خروج</button>`
      : `<select id="whoSelect"><option value="">اختر اسمك</option>${state.members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select>
         <input type="tel" id="whoCodeInput" placeholder="رقم جوالك" style="max-width:130px;" maxlength="15" inputmode="tel">
         <button class="sm primary" id="loginBtn">دخول</button>
         <span id="loginError" style="color:var(--red);font-size:12.5px;"></span>`}
      ${notifPermission==='default' ? `<button class="sm ghost" id="enableNotifBtn">${icon('bell')}فعّل التنبيهات</button>` : ''}
      ${notifPermission==='granted' ? `<span style="font-size:12px;color:var(--text-dim);">${icon('bell')}التنبيهات مفعّلة</span>` : ''}
    </div>
  </div>`;

  html += `<div class="tabs">
    ${tabBtn('home','الرئيسية','home')}${tabBtn('schedule','الجدول السنوي','calendar')}${tabBtn('members','الأعضاء والمعازيب','users')}
    ${tabBtn('invites','العزايم','megaphone')}${tabBtn('reports','التقارير','poll')}${tabBtn('settings','الإعدادات','settings')}${tabBtn('kitchen','المطبخ','utensils')}
  </div>`;

  html += `<div id="content"></div>`;
  html += `<footer class="note">${(HAS_CLAUDE_STORAGE || HAS_FIREBASE) ? 'البيانات مشتركة بين كل من يفتح هذا الرابط داخل المجموعة' : '⚠️ وضع محلي: بياناتك محفوظة بمتصفحك فقط، ما تتزامن مع أجهزة ثانية'}</footer>`;
  app.innerHTML = html;

  const tripNameInput = document.getElementById('tripNameInput');
  tripNameInput.addEventListener('input', e=>{ state.tripName = e.target.value; });
  tripNameInput.addEventListener('blur', ()=>{
    if(!state.tripName.trim()) state.tripName='طلعة الأصدقاء';
    saveState();
    const idxEntry = tripsIndex.find(t=>t.id===currentTripId);
    if(idxEntry){ idxEntry.name = state.tripName; saveTripsIndex(); }
  });

  const loginBtn = document.getElementById('loginBtn');
  if(loginBtn){
    loginBtn.addEventListener('click', ()=>{
      const mid = document.getElementById('whoSelect').value;
      const code = normalizeDigits(document.getElementById('whoCodeInput').value);
      const err = document.getElementById('loginError');
      const m = memberById(mid);
      if(!m){ err.textContent='اختر اسمك أولاً'; return; }
      if(m.code !== code){ err.textContent='رقم الجوال غير صحيح'; return; }
      currentUserId = mid; saveSession(); startPolling(); render();
    });
  }
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn){ logoutBtn.addEventListener('click', ()=>{ switchTrip(); }); }
  const enableNotifBtn = document.getElementById('enableNotifBtn');
  if(enableNotifBtn){ enableNotifBtn.addEventListener('click', requestNotifPermission); }

  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{ currentTab=b.dataset.tab; if(currentTab==='home') hasNewNotif=false; render(); }));

  renderContent();
}
function tabBtn(id,label,iconName){ return `<button class="tab-btn ${currentTab===id?'active':''}" data-tab="${id}">${icon(iconName)}${label}${(id==='home'&&hasNewNotif)?'<span class="notif-dot"></span>':''}</button>`; }

function renderContent(){
  const c = document.getElementById('content');
  if(currentTab==='home') c.innerHTML = renderHome();
  else if(currentTab==='schedule') c.innerHTML = renderSchedule();
  else if(currentTab==='members') c.innerHTML = renderMembers();
  else if(currentTab==='invites') c.innerHTML = renderInvitesArchive();
  else if(currentTab==='reports') c.innerHTML = renderReports();
  else if(currentTab==='settings') c.innerHTML = renderSettings();
  else if(currentTab==='kitchen') c.innerHTML = renderKitchen();
  attachContentEvents();
  hydrateImages();
}

function isCurrentHost(occ){
  if(isTripAdmin) return true;
  if(!currentUserId) return false;
  const p = pairById(occ.hostPairId);
  return !!(p && p.memberIds.includes(currentUserId));
}

function avatarHtml(mid){
  const m = memberById(mid);
  if(!m) return `<div class="avatar sm">؟</div>`;
  if(m.hasAvatar){ return `<div class="avatar sm"><img data-photo-key="avatar:${m.id}" alt=""></div>`; }
  return `<div class="avatar sm">${esc((m.name||'؟').slice(0,1))}</div>`;
}

function renderRatingInputs(occ){
  const raterId = currentUserId || (isTripAdmin ? '__admin__' : null);
  const my = occ.rating.raters[raterId] || {place:0,vibe:0,food:0};
  const cats = [['place','المكان'],['vibe','الجو'],['food','الأكل']];
  return cats.map(([key,label])=>`
    <div class="row between" style="padding:4px 0;">
      <span style="font-size:13px;color:var(--text-dim);">${label}</span>
      <div class="stars" data-rate-occ="${key}">
        ${[1,2,3,4,5].map(n=>`<span class="star ${my[key]>=n?'on':''}" data-val="${n}">★</span>`).join('')}
      </div>
    </div>`).join('');
}
function renderRatingAverages(occ){
  const raters = Object.values(occ.rating.raters);
  if(raters.length===0) return `<div class="empty" style="padding:10px 0 0;">لا يوجد تقييمات بعد</div>`;
  const avg = key => (raters.reduce((s,r)=>s+(r[key]||0),0)/raters.length).toFixed(1);
  return `<div style="margin-top:10px;font-size:13px;color:var(--text-dim);border-top:1px solid var(--line);padding-top:10px;">
    المتوسط — المكان: <strong style="color:var(--accent-text);">${avg('place')}</strong> ·
    الجو: <strong style="color:var(--accent-text);">${avg('vibe')}</strong> ·
    الأكل: <strong style="color:var(--accent-text);">${avg('food')}</strong>
  </div>`;
}

    const badge = occ.status==='scheduled'?'scheduled':occ.status==='done'?'done':occ.status==='canceled'?'canceled':'postponed';

    return `<div class="occ-item">
      <div class="row between">
        <div><strong>الأسبوع ${occ.index+1}</strong> — ${esc(pairLabel(occ.hostPairId))}</div>

      </div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:4px;">${fmtDate(occ.date)}${occ.location?' · '+esc(occ.location):''}</div>

function monthKey(dateISO){ return dateISO.slice(0,7); }
function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1, 1);
  return d.toLocaleDateString('ar-SA', {year:'numeric', month:'long'});
}
function computeAttendance(occList){
  const total = occList.length;
  const counts = {};
  state.members.forEach(m=>counts[m.id]=0);
  occList.forEach(o=>{ (o.kitty.attendees||[]).forEach(mid=>{ if(mid in counts) counts[mid]++; }); });
  return { total, counts };
}
let expandedArchiveId = null;
function renderInvitesArchive(){
  const items = state.occasions.filter(o=>o.inviteSent || o.postponeSent)

    const expanded = expandedArchiveId === occ.id;
    return `<div class="occ-item" data-archive-toggle="${occ.id}" style="cursor:pointer;">
      <div class="row between">

  const share = occ.kitty.attendees.length ? (occ.kitty.total / occ.kitty.attendees.length) : 0;
  const raters = Object.values(occ.rating.raters||{});

  return `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line);" onclick="event.stopPropagation()">
    <div style="font-size:13px;font-weight:700;margin-bottom:6px;">${icon('camera')}صورة الذكرى</div>

      ${occ.kitty.attendees.every(mid=>occ.kitty.paid[mid]) ? `<div style="color:var(--green);font-size:13px;">دفع الكل ✅ (${occ.kitty.total} ريال، نصيب كل واحد ${share.toFixed(1)} ريال)</div>` : `

function renderReports(){
  const doneOccs = state.occasions.filter(o=>o.status==='done');
  const months = [...new Set(doneOccs.map(o=>monthKey(o.date)))].sort().reverse();
  if(!reportSelectedMonth || !months.includes(reportSelectedMonth)) reportSelectedMonth = months[0] || null;
  const monthOccs = reportSelectedMonth ? doneOccs.filter(o=>monthKey(o.date)===reportSelectedMonth) : [];
  const monthStats = computeAttendance(monthOccs);
  const yearStats = computeAttendance(doneOccs);

  return `<div class="card">
    <h3>${icon('poll')}تقرير الحضور الشهري</h3>
    ${months.length ? `
    <div class="field">
      <label class="field-label">اختر الشهر</label>
      <select id="reportMonthSelect">
        ${months.map(mk=>`<option value="${mk}" ${mk===reportSelectedMonth?'selected':''}>${monthLabel(mk)}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:6px;">عدد الطلعات هذا الشهر: ${monthStats.total}</div>
    ${state.members.map(m=>{
      const c = monthStats.counts[m.id]||0;
      const pct = monthStats.total ? Math.round(c/monthStats.total*100) : 0;
      return `<div class="kitty-row"><span>${esc(m.name)}</span><span style="font-size:13px;color:var(--text-dim);">${c} من ${monthStats.total} (${pct}%)</span></div>`;
    }).join('')}
    ` : `<div class="empty">ما فيه طلعات منتهية بعد لعرض تقرير</div>`}
  </div>

  <div class="card">
    <h3>${icon('poll')}تقرير الحضور السنوي</h3>
    <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:6px;">إجمالي الطلعات المنتهية: ${yearStats.total}</div>

    }).join('') : `<div class="empty">ما فيه بيانات كافية بعد</div>`}
  </div>`;
}

/* ---------- events ---------- */
function attachContentEvents(){
  const occ = getHomeOcc();

  document.querySelectorAll('[data-archive-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-archive-toggle');
      expandedArchiveId = (expandedArchiveId === id) ? null : id;
      renderContent();
    });
  });

  const locInput = document.getElementById('locInput');
  if(locInput){
    document.getElementById('saveLocBtn').addEventListener('click', ()=>{
      occ.location=locInput.value;
      const mapInp = document.getElementById('locMapInput');
      if(mapInp) occ.locationMapLink = mapInp.value.trim();
      occ.inviteAutoGenerated = true; delete weatherDraftCache[occ.id];
      saveState(); renderContent();
    });
    document.getElementById('swapBtn').addEventListener('click', ()=>{
      const rest = state.occasions.filter(o=>o.status==='scheduled' && o.id!==occ.id).sort((a,b)=>a.date.localeCompare(b.date));
      if(rest.length===0){ showAlert('لا يوجد طلعة تالية للتبديل معها'); return; }
      const nextOcc = rest[0];
      const tmp = occ.hostPairId; occ.hostPairId = nextOcc.hostPairId; nextOcc.hostPairId = tmp;
      if(!occ.inviteSent){ occ.inviteAutoGenerated = true; delete weatherDraftCache[occ.id]; }
      if(!nextOcc.inviteSent){ nextOcc.inviteAutoGenerated = true; delete weatherDraftCache[nextOcc.id]; }
      saveState(); renderContent();
    });
  }
  const inviteMsgEl = document.getElementById('inviteMsg');
  if(inviteMsgEl){
    const runWeatherFetch = (force)=>{
      const cacheKey = occ.id + ':' + (occ.location||'') + ':' + occ.hostPairId + ':' + (occ.locationMapLink||'');
      const alreadyFresh = !force && occ.inviteAutoGenerated !== false && weatherDraftCache[occ.id] === cacheKey;
      if(!force && (occ.inviteAutoGenerated === false || alreadyFresh)) return;
      const statusEl = document.getElementById('weatherInviteStatus');
      if(statusEl) statusEl.textContent = 'جارٍ تحضير رسالة الدعوة...';
      if(!inviteMsgEl.value) inviteMsgEl.value = suggestedInvite(occ);
      if(force) occ.inviteAutoGenerated = true;
      occ._weatherReqId = (occ._weatherReqId || 0) + 1;
      const reqId = occ._weatherReqId;
      fetchWeatherForOccasion(occ).then(weather=>{
        weatherDraftCache[occ.id] = cacheKey;
        if(occ._weatherReqId !== reqId || occ.inviteAutoGenerated === false) return;
        const stillThere = document.getElementById('inviteMsg');
        const built = buildWeatherInvite(occ, weather);
        occ.inviteMessage = built;
        if(stillThere) stillThere.value = built;
        saveState();
        const s = document.getElementById('weatherInviteStatus');
        if(s){ s.textContent = weather ? 'تم جلب الطقس ✓' : (occ.location ? `تعذر جلب الطقس لموقع "${occ.location}" — جرّب اسم مدينة أوضح أو اضغط إعادة المحاولة` : 'حدد مكان الطلعة فوق عشان تضاف حالة الطقس'); }
      });
    };
    runWeatherFetch(false);
    inviteMsgEl.addEventListener('input', ()=>{
      occ.inviteAutoGenerated = false;
      occ.inviteMessage = inviteMsgEl.value;
      occ._weatherReqId = (occ._weatherReqId || 0) + 1;
    });
    const retryWeatherBtn = document.getElementById('retryWeatherBtn');
    if(retryWeatherBtn) retryWeatherBtn.addEventListener('click', ()=> runWeatherFetch(true));
  }
  const sendAnnounceBtn = document.getElementById('sendAnnounceBtn');
  if(sendAnnounceBtn){
    sendAnnounceBtn.addEventListener('click', ()=>{
      occ.inviteMessage = document.getElementById('inviteMsg').value;
      occ.inviteType='announce'; occ.inviteSent=true; occ.inviteAutoGenerated=false; occ.responses = occ.responses||{};
      saveState(); renderContent();
    });
    document.getElementById('openPostponeBtn').addEventListener('click', ()=>{
      showPostponeModal('حدد سبب التأجيل والتاريخ الجديد للطلعة:', (reason, newDate)=>{
        occ.cancelReason = reason || '';
        occ.postponeMessage = postponeText(occ, newDate || null);
        occ.postponeSent = true;
        occ.inviteAutoGenerated = false;
        if(newDate){
          occ.date = newDate;
          occ.status = 'scheduled';
          occ.wasPostponed = true;
        } else {
          occ.status = 'postponed';
        }
        saveState(); renderContent();
      });
    });
  }
  const rsvpYes = document.getElementById('rsvpYes');
  if(rsvpYes){
    rsvpYes.addEventListener('click', ()=>{ submitRsvpResponse(occ.id, 'yes'); });
    document.getElementById('rsvpNo').addEventListener('click', ()=>{ submitRsvpResponse(occ.id, 'no'); });
  }
  const photoInput = document.getElementById('photoInput');
  if(photoInput){
    photoInput.addEventListener('change', e=>{
      const file = e.target.files[0]; if(!file) return;
      resizeImage(file, 900, 0.7, dataUrl=>{
        saveImage('photo:'+occ.id, dataUrl);
        occ.hasPhoto = true; occ.photoDate = todayISO();
        saveState(); renderContent();
      });
    });
    document.getElementById('markDoneBtn').addEventListener('click', ()=>{ occ.status='done'; saveState(); renderContent(); });
  }
  const saveKittyBtn = document.getElementById('saveKittyBtn');
  if(saveKittyBtn){
    saveKittyBtn.addEventListener('click', ()=>{
      const checked = Array.from(document.querySelectorAll('.attendeeChk:checked')).map(c=>c.value);
      occ.kitty.attendees = checked;
      occ.kitty.total = parseFloat(document.getElementById('kittyTotal').value) || 0;
      checked.forEach(mid=>{ if(!(mid in occ.kitty.paid)) occ.kitty.paid[mid] = false; });
      Object.keys(occ.kitty.paid).forEach(mid=>{ if(!checked.includes(mid)) delete occ.kitty.paid[mid]; });
      saveState(); renderContent();
    });
  }
  document.querySelectorAll('[data-pay]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const mid = btn.getAttribute('data-pay');
      try{
        const res = await storageGet(tripDataKey(currentTripId), true);
        const fresh = JSON.parse(res.value);
        if(fresh.deleted) return;
        const freshOcc = fresh.occasions.find(o=>o.id===occ.id);
        if(freshOcc){ freshOcc.kitty.paid[mid] = true; }
        await storageSetRetry(tripDataKey(currentTripId), JSON.stringify(fresh), true);
        state = normalizeState(fresh); hideSaveWarning(); renderContent();
      }catch(e){
        occ.kitty.paid[mid] = true; saveState(); renderContent();
      }
    });
  });
  document.querySelectorAll('[data-rate-occ]').forEach(group=>{
    group.querySelectorAll('.star').forEach(star=>{
      star.addEventListener('click', ()=>{
        const raterId = currentUserId || (isTripAdmin ? '__admin__' : null);
        if(!raterId) return;
        const key = group.getAttribute('data-rate-occ');
        const val = parseInt(star.getAttribute('data-val'));
        if(!occ.rating.raters[raterId]) occ.rating.raters[raterId] = {place:0,vibe:0,food:0};
        occ.rating.raters[raterId][key] = val;
        saveState(); renderContent();
      });
    });
  });
  const copyApologyBtn = document.getElementById('copyApologyBtn');
  if(copyApologyBtn){
    copyApologyBtn.addEventListener('click', ()=>{
      navigator.clipboard.writeText(occ.apologyMessage).then(()=>{
        copyApologyBtn.textContent = 'تم النسخ ✓';
        setTimeout(()=>{ copyApologyBtn.textContent = 'نسخ الرسالة'; }, 1800);
      }).catch(()=> showAlert('تعذر النسخ، انسخ الرسالة يدويًا'));
    });
  }
  const confirmPostponeDateBtn = document.getElementById('confirmPostponeDateBtn');
  if(confirmPostponeDateBtn){
    confirmPostponeDateBtn.addEventListener('click', ()=>{
      const newDate = document.getElementById('postponeNewDateInput').value;
      if(!newDate){ showAlert('حدد تاريخ أولًا'); return; }
      occ.date = newDate; occ.status='scheduled'; occ.wasPostponed = true;
      occ.postponeMessage = postponeText(occ, newDate);
      saveState(); render();
    });
  }

  document.querySelectorAll('.postponeDate').forEach(inp=>{
    inp.addEventListener('change', ()=>{});
  });
  document.querySelectorAll('[data-open-home]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      homeOccId = btn.getAttribute('data-open-home');
      currentTab = 'home';
      render();
    });
  });
  document.querySelectorAll('[data-confirm-postpone]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-confirm-postpone');
      const o = state.occasions.find(x=>x.id===id);
      const inp = document.querySelector(`.postponeDate[data-occ="${id}"]`);
      o.date = inp.value; o.status='scheduled';
      saveState(); render();
    });
  });

  const addMemberBtn = document.getElementById('addMemberBtn');
  if(addMemberBtn){
    const avatarFileInput = document.getElementById('newMemberAvatar');
    if(avatarFileInput){
      avatarFileInput.addEventListener('change', ()=>{
        const label = document.getElementById('newMemberAvatarLabel');
        if(label) label.textContent = avatarFileInput.files[0] ? avatarFileInput.files[0].name.slice(0,14) : 'صورة (اختياري)';
      });
    }
    addMemberBtn.addEventListener('click', ()=>{
      const nameInput = document.getElementById('newMemberName');
      const phoneInput = document.getElementById('newMemberPhone');
      const name = nameInput.value.trim(); if(!name) return;
      const phone = normalizeDigits((phoneInput?.value||'').trim());
      if(!phone){ showAlert('أدخل رقم الجوال عشان يقدر العضو يسجّل دخوله'); return; }
      if(state.members.find(m=>m.phone===phone)){ showAlert('رقم الجوال هذا مسجّل لعضو ثاني'); return; }
      const fileInput = document.getElementById('newMemberAvatar');
      const newId = uid();
      const member = { id:newId, name, phone, hasAvatar:false, code: phone };
      state.members.push(member);
      const finish = ()=>{
        saveState(); render();
        showAlert(`تمت إضافة ${name}. رقم جواله ${phone} هو كلمة مروره لتسجيل الدخول.`);
      };
      if(fileInput.files[0]){
        resizeImage(fileInput.files[0], 120, 0.7, dataUrl=>{
          saveImage('avatar:'+newId, dataUrl);
          member.hasAvatar = true;
          finish();
        });
      } else finish();
    });
  }
  document.querySelectorAll('[data-rm-member]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-rm-member');
      showConfirm('حذف هذا العضو؟', ()=>{
        state.members = state.members.filter(m=>m.id!==id);
        state.hostPairs = state.hostPairs.filter(p=>!p.memberIds.includes(id));
        saveState(); render();
      });
    });
  });
  const addPairBtn = document.getElementById('addPairBtn');
  if(addPairBtn){
    addPairBtn.addEventListener('click', ()=>{
      const a = document.getElementById('pairMember1').value;
      const b = document.getElementById('pairMember2').value;
      const c = document.getElementById('pairMember3')?.value || '';
      if(!a || !b || a===b){ showAlert('اختر عضوين مختلفين على الأقل'); return; }
      const ids = [a, b];
      if(c && c!==a && c!==b) ids.push(c);
      state.hostPairs.push({ id:uid(), memberIds:ids });
      saveState(); render();
    });
  }
  document.querySelectorAll('[data-rm-pair]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.hostPairs = state.hostPairs.filter(p=>p.id!==btn.getAttribute('data-rm-pair'));
      saveState(); render();
    });
  });

  const freqSelect = document.getElementById('freqSelect');
  if(freqSelect){
    freqSelect.addEventListener('change', e=>{ state.frequency=e.target.value; saveState(); });
    document.getElementById('weekdaySelect').addEventListener('change', e=>{ state.preferredWeekday=parseInt(e.target.value); saveState(); });
    const occasionTimeInput = document.getElementById('occasionTimeInput');
    if(occasionTimeInput) occasionTimeInput.addEventListener('change', e=>{ state.occasionTime=e.target.value; saveState(); });
    document.getElementById('startDateInput').addEventListener('change', e=>{ state.scheduleStartDate=e.target.value; saveState(); });
    document.getElementById('genScheduleBtn').addEventListener('click', generateYearSchedule);
    document.getElementById('addExclBtn').addEventListener('click', ()=>{
      const label = document.getElementById('exclLabel').value.trim() || 'فترة مستبعدة';
      const start = document.getElementById('exclStart').value;
      const end = document.getElementById('exclEnd').value;
      if(!start || !end){ showAlert('حدد تاريخ البداية والنهاية'); return; }
      state.excludedPeriods.push({ id:uid(), label, start, end });
      saveState(); render();
    });
    document.querySelectorAll('[data-rm-excl]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.excludedPeriods = state.excludedPeriods.filter(p=>p.id!==btn.getAttribute('data-rm-excl'));
        saveState(); render();
      });
    });
    document.getElementById('resetAllBtn').addEventListener('click', ()=>{
      showConfirm('هذا سيمسح كل بيانات هذي الطلعة نهائيًا. متأكد؟', ()=>{
        const keepName = state.tripName;
        state = blankTripState(keepName); currentUserId=null; homeOccId=null; saveState(); render();
        const idxEntry = tripsIndex.find(t=>t.id===currentTripId);
        if(idxEntry){ idxEntry.code = state.tripCode; saveTripsIndex(); }
        showAlert(`تم التصفير. كود الدخول الجديد: ${state.tripCode}`);
      });
    });
    document.getElementById('deleteTripBtn').addEventListener('click', ()=>{
      showConfirm(`هذا يحذف طلعة "${state.tripName}" نهائيًا من النظام لكل الأعضاء. ما ينرجع بعدها إطلاقًا. متأكد؟`, async ()=>{
        const tid = currentTripId;
        tripsIndex = tripsIndex.filter(t=>t.id!==tid);
        await saveTripsIndex();
        try{ await storageSetRetry(tripDataKey(tid), JSON.stringify({deleted:true}), true); }catch(e){}
        clearSession();
        await switchTrip();
        showAlert('تم حذف الطلعة نهائيًا.');
      });
    });
    const regenCodeBtn = document.getElementById('regenCodeBtn');
    if(regenCodeBtn){
      regenCodeBtn.addEventListener('click', ()=>{
        showConfirm('توليد كود جديد يلغي الكود القديم فورًا لأي شخص ما دخل بعد. متأكد؟', ()=>{
          state.tripCode = genTripCode();
          saveState(); render();
          const idxEntry = tripsIndex.find(t=>t.id===currentTripId);
          if(idxEntry){ idxEntry.code = state.tripCode; saveTripsIndex(); }
          showAlert('الكود الجديد: ' + state.tripCode);
        });
      });
    }
    const sendAnnouncementBtn = document.getElementById('sendAnnouncementBtn');
    if(sendAnnouncementBtn){
      sendAnnouncementBtn.addEventListener('click', ()=>{
        const text = document.getElementById('announcementInput').value.trim();
        if(!text) return;
        state.announcements.push({ id: uid(), text, createdAt: Date.now(), ackBy: {} });
        saveState(); render();
      });
    }
    document.querySelectorAll('[data-del-announcement]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-del-announcement');
        state.announcements = state.announcements.filter(a=>a.id!==id);
        saveState(); render();
      });
    });
    const clearAllAnnouncementsBtn = document.getElementById('clearAllAnnouncementsBtn');
    if(clearAllAnnouncementsBtn){
      clearAllAnnouncementsBtn.addEventListener('click', ()=>{
        showConfirm('مسح كل الرسائل الإدارية المرسلة؟ هذا ما يؤثر على استلام الأعضاء لها، بس يمسحها من عندك.', ()=>{
          state.announcements = [];
          saveState(); render();
        });
      });
    }
  }
  const switchTripBtn = document.getElementById('switchTripBtn');
  if(switchTripBtn){ switchTripBtn.addEventListener('click', switchTrip); }
  const reportMonthSelect = document.getElementById('reportMonthSelect');
  if(reportMonthSelect){
    reportMonthSelect.addEventListener('change', e=>{ reportSelectedMonth = e.target.value; renderContent(); });
  }

  const goNextBtn = document.getElementById('goNextBtn');
  if(goNextBtn){
    goNextBtn.addEventListener('click', ()=>{ homeOccId = null; renderContent(); });
  }

  const addRestBtn = document.getElementById('addRestBtn');
  if(addRestBtn){
    addRestBtn.addEventListener('click', ()=>{
      const name = document.getElementById('newRestName').value.trim(); if(!name) return;
      const phone = document.getElementById('newRestPhone').value.trim();
      const notes = document.getElementById('newRestNotes').value.trim();
      state.restaurants.push({ id:uid(), name, phone, notes, ratings:[] });
      saveState(); render();
    });
  }
  document.querySelectorAll('[data-rate-restaurant]').forEach(group=>{
    group.querySelectorAll('.star').forEach(star=>{
      star.addEventListener('click', ()=>{
        if(!currentUserId && !isTripAdmin){ showAlert('اختر اسمك أولاً من الأعلى'); return; }
        const raterId = currentUserId || '__admin__';
        const rid = group.getAttribute('data-rate-restaurant');
        const r = state.restaurants.find(x=>x.id===rid);
        const val = parseInt(star.getAttribute('data-val'));
        const existing = r.ratings.find(x=>x.memberId===raterId);
        if(existing) existing.stars = val; else r.ratings.push({ memberId: raterId, stars: val });
        saveState(); render();
      });
    });
  });
  if(currentTab==='home') maybeShowMessagePopup(occ);
}

function hydrateImages(){
  document.querySelectorAll('img[data-photo-key]').forEach(async img=>{
    const key = img.getAttribute('data-photo-key');
    const url = await fetchImage(key);
    if(url) img.src = url;
  });
}

loadApp();
</script>
</body>
</html>
