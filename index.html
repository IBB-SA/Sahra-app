<html lang="ar" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #1B1E27; --bg-deep:#14161D; --card:#22252F; --card-2:#2B2F3B;
    --amber:#C9A227; --amber-dim:#3E3418; --violet:#2FA894; --coral:#B8564A; --green:#2FA894;
    --red:#B8564A; --text:#F0EDE4; --text-dim:#8A8F9E; --line:#343946;
    --grad: #C9A227; --beige:#F0EDE4; --beige-dim:#8A8F9E; --accent-text: var(--amber);
  }
  html[data-theme="light"]{
    --bg: #FAF8F3; --bg-deep:#F3F0E8; --card:#FFFFFF; --card-2:#F1EDE2;
    --amber:#A8790C; --amber-dim:#F0E3BE; --violet:#1F8A78; --coral:#A8453B; --green:#1F8A78;
    --red:#A8453B; --text:#201F1A; --text-dim:#6C6A5E; --line:#E4DFD0;
    --grad: #A8790C; --beige:#201F1A; --beige-dim:#6C6A5E; --accent-text: var(--amber);
  }
  html[data-theme="light"] #modalOverlay{background:rgba(30,28,20,.55);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--bg-deep);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3{font-family:'Lalezar','Tajawal',sans-serif;font-weight:400;margin:0;}
  .wrap{max-width:820px;margin:0 auto;padding:16px 14px calc(90px + env(safe-area-inset-bottom));}
  .topbar{ margin-bottom:18px; }
  .trip-name-field{ margin-bottom:12px; }
  .trip-name{
    font-size:22px; color:var(--amber); font-family:'Lalezar','Tajawal',sans-serif;
    outline:none; width:100%; display:block; background:var(--card);
    border:1.5px solid var(--line); border-radius:12px; padding:12px 14px;
  }
  .trip-name:focus{ border-color:var(--amber); }
  .who-am-i-row{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); flex-wrap:wrap; }
  .who-am-i{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);}
  select,input[type=text],input[type=number],input[type=date],input[type=tel],textarea{
    font-family:'Tajawal',sans-serif;background:var(--bg);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font-size:16px;outline:none;min-height:44px;
  }
  textarea{min-height:70px;}
  select:focus,input:focus,textarea:focus{border-color:var(--violet);}
  button{font-family:'Tajawal',sans-serif;cursor:pointer;border-radius:10px;padding:11px 16px;font-size:14px;
    font-weight:500;border:1px solid var(--line);background:var(--card-2);color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;}
  button:active{transform:scale(.97);}
  button.primary{background:var(--grad);color:#14161D;border:none;font-weight:700;}
  button.primary .icon{color:#14161D;}
  button.danger{border-color:var(--red);color:var(--red);background:none;}
  button.ghost{background:none;}
  button.sm{padding:8px 12px;font-size:13px;min-height:38px;}
  .file-btn{font-family:'Tajawal',sans-serif;cursor:pointer;border-radius:10px;padding:11px 16px;font-size:14px;
    font-weight:500;border:1px solid var(--line);background:var(--card-2);color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:42px;white-space:nowrap;}
  .file-btn.sm{padding:8px 12px;font-size:13px;min-height:38px;}
  .file-btn:active{transform:scale(.97);}
  .icon{width:16px;height:16px;flex-shrink:0;vertical-align:-3px;color:var(--accent-text);}
  .tabs{display:flex;gap:2px;overflow-x:auto;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:0;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;border-radius:0;padding:12px 10px;
    color:var(--text-dim);white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px;
    min-height:46px;flex-shrink:0;}
  .tab-btn.active{color:#000;border-color:#000;font-weight:700;}
  .tab-btn.active .icon{color:#000;}
  .tab-btn .icon{width:17px;height:17px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .card h3{font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;color:#000;margin-bottom:12px;
    display:flex;align-items:center;gap:7px;}
  .card h3 .icon{width:16px;height:16px;color:var(--accent-text);}
  .banner{background:var(--card-2);border:1px solid var(--amber-dim);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--text);}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .row.between{justify-content:space-between;}
  .row > input, .row > select{flex:1 1 140px;min-width:0;}
  .badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge.scheduled{background:var(--card-2);color:var(--text);border:1px solid var(--line);}
  .badge.done{background:var(--green);color:#14161D;}
  .badge.canceled{background:none;color:var(--red);border:1px solid var(--red);text-decoration:line-through;}
  .badge.postponed{background:var(--amber-dim);color:var(--amber);}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--amber);color:#fff;display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .avatar.sm{width:28px;height:28px;font-size:12px;}
  .host-pair{display:flex;gap:10px;align-items:center;}
  textarea.note{width:100%;min-height:80px;resize:vertical;line-height:1.6;}
  .stars{display:flex;gap:6px;font-size:24px;cursor:pointer;}
  .star{color:var(--line);padding:4px;}
  .star.on{color:var(--accent-text);}
  .occ-item{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;background:var(--card);}
  .member-chip{background:var(--card-2);border:1px solid var(--line);border-radius:30px;padding:6px 10px 6px 6px;
    display:flex;align-items:center;gap:8px;font-size:13.5px;}
  .member-chip button{border:none;background:none;padding:6px 8px;color:#000;font-size:16px;min-height:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .empty{color:var(--text-dim);font-size:14px;text-align:center;padding:20px 0;}
  label.field-label{font-size:12.5px;color:var(--text-dim);display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .rsvp-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .rsvp-chip{border-radius:20px;padding:6px 12px;font-size:12.5px;border:1px solid var(--line);}
  .rsvp-chip.yes{background:var(--green);color:#14161D;border-color:var(--green);}
  .rsvp-chip.no{background:none;color:var(--red);border-color:var(--red);}
  .rsvp-chip.pending{color:var(--text-dim);}
  .pct-bar{height:8px;border-radius:6px;background:var(--line);overflow:hidden;margin:8px 0;}
  .pct-fill{height:100%;background:var(--grad);}
  .kitty-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .kitty-row:last-child{border-bottom:none;}
  .photo-preview{max-width:100%;border-radius:12px;margin-top:10px;display:block;}
  .restaurant-item{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  footer.note{text-align:center;color:var(--text-dim);font-size:12px;margin-top:24px;}
  input[type=checkbox]{width:18px;height:18px;flex-shrink:0;accent-color:var(--violet);}
  #modalButtons{flex-wrap:wrap;}
  #modalButtons button{flex:1 1 auto;}
  @media(max-width:600px){.grid2{grid-template-columns:1fr;}}
  @media(max-width:420px){
    .card{padding:14px;border-radius:14px;}
    .trip-name{font-size:19px;}
    button.sm{font-size:12.5px;padding:7px 10px;}
    .tab-btn{padding:11px 7px;font-size:13px;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">... جاري التحميل</div></div>

<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(10,11,20,.7);z-index:999;align-items:center;justify-content:center;padding:16px;">
  <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;max-width:360px;width:100%;">
    <div id="modalMsg" style="margin-bottom:14px;font-size:14.5px;line-height:1.6;"></div>
    <input type="text" id="modalInput" style="display:none;width:100%;margin-bottom:14px;">
    <div style="display:flex;gap:8px;justify-content:flex-start;" id="modalButtons"></div>
  </div>
</div>

<div id="saveWarningBanner" style="display:none;position:fixed;bottom:16px;left:16px;right:16px;max-width:420px;margin:0 auto;background:#22252F;border:1.5px solid #B8564A;color:#B8564A;padding:10px 14px;border-radius:12px;font-size:13px;z-index:998;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 18px rgba(0,0,0,.35);">
  <span>⚠️ تعذر حفظ آخر تغيير، تأكد من اتصالك بالنت</span>
  <button class="sm" id="retrySaveBtn" style="border-color:var(--red);color:var(--red);flex-shrink:0;">إعادة المحاولة</button>
</div>

<button id="themeToggleBtn" aria-label="تبديل الوضع الفاتح/الداكن" style="position:fixed;top:12px;left:12px;z-index:500;width:38px;height:38px;min-height:auto;padding:0;border-radius:50%;background:var(--card);border:1px solid var(--line);color:var(--accent-text);display:flex;align-items:center;justify-content:center;"></button>

<script>
function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }
function showAlert(msg){
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('modalInput').style.display='none';
  document.getElementById('modalButtons').innerHTML = '<button class="primary sm" id="mOk">حسنًا</button>';
  document.getElementById('modalOverlay').style.display='flex';
  document.getElementById('mOk').onclick = closeModal;
}
function showConfirm(msg, onYes){
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('modalInput').style.display='none';
  document.getElementById('modalButtons').innerHTML = '<button class="sm" id="mNo">تراجع</button><button class="primary sm" id="mYes">تأكيد</button>';
  document.getElementById('modalOverlay').style.display='flex';
  document.getElementById('mNo').onclick = closeModal;
  document.getElementById('mYes').onclick = ()=>{ closeModal(); onYes(); };
}
function showPrompt(msg, defVal, onSubmit){
  document.getElementById('modalMsg').textContent = msg;
  const inp = document.getElementById('modalInput');
  inp.style.display='block'; inp.value = defVal || '';
  document.getElementById('modalButtons').innerHTML = '<button class="sm" id="mNo">تراجع</button><button class="primary sm" id="mYes">تأكيد</button>';
  document.getElementById('modalOverlay').style.display='flex';
  document.getElementById('mNo').onclick = closeModal;
  document.getElementById('mYes').onclick = ()=>{ const v=inp.value; closeModal(); onSubmit(v); };
  setTimeout(()=>inp.focus(), 30);
}
function showChoice(msg, choices){
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('modalInput').style.display='none';
  document.getElementById('modalButtons').innerHTML = choices.map((c,i)=>
    `<button class="sm ${c.cls||''}" id="mChoice${i}">${c.label}</button>`).join('');
  document.getElementById('modalOverlay').style.display='flex';
  choices.forEach((c,i)=>{ document.getElementById('mChoice'+i).onclick = ()=>{ closeModal(); c.action(); }; });
}

let lastFailedSave = null;
function showSaveWarning(retryFn){
  lastFailedSave = retryFn;
  const b = document.getElementById('saveWarningBanner');
  if(b) b.style.display = 'flex';
}
function hideSaveWarning(){
  lastFailedSave = null;
  const b = document.getElementById('saveWarningBanner');
  if(b) b.style.display = 'none';
}
document.getElementById('retrySaveBtn').addEventListener('click', ()=>{
  if(lastFailedSave) lastFailedSave();
});

const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage !== null);
const LS_PREFIX = 'sahra:';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyArcf7JKyiv6wL1eKLyiB5WCTZG7kxhqng",
  authDomain: "sahra-67126.firebaseapp.com",
  projectId: "sahra-67126",
  storageBucket: "sahra-67126.firebasestorage.app",
  messagingSenderId: "737846079703",
  appId: "1:737846079703:web:c6eca57860a0f4e9b54092"
};
let firebaseDb = null;
let HAS_FIREBASE = false;
try{
  if(!HAS_CLAUDE_STORAGE && typeof firebase !== 'undefined'){
    firebase.initializeApp(FIREBASE_CONFIG);
    firebaseDb = firebase.firestore();
    HAS_FIREBASE = true;
  }
}catch(e){ console.error('تعذر تهيئة Firebase', e); HAS_FIREBASE = false; }

async function storageGet(key, shared){
  if(HAS_CLAUDE_STORAGE) return window.storage.get(key, shared);
  if(shared && HAS_FIREBASE){
    const doc = await firebaseDb.collection('sahra_kv').doc(key).get();
    if(!doc.exists) throw new Error('not found');
    return { key, value: doc.data().value, shared };
  }
  const raw = localStorage.getItem(LS_PREFIX + key);
  if(raw === null) throw new Error('not found');
  return { key, value: raw, shared };
}
async function storageSetRaw(key, value, shared){
  if(HAS_CLAUDE_STORAGE) return window.storage.set(key, value, shared);
  if(shared && HAS_FIREBASE){
    await firebaseDb.collection('sahra_kv').doc(key).set({ value });
    return { key, value, shared };
  }
  localStorage.setItem(LS_PREFIX + key, value);
  return { key, value, shared };
}

async function storageSetRetry(key, value, shared, attempts){
  attempts = attempts || 3;
  let lastErr;
  for(let i=0; i<attempts; i++){
    try{
      const res = await storageSetRaw(key, value, shared);
      return res;
    }catch(e){
      lastErr = e;
      if(i < attempts-1) await new Promise(r=>setTimeout(r, 400*(i+1)));
    }
  }
  throw lastErr;
}
</script>

function resizeImage(file, maxDim, quality, cb){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxDim){ h=h*maxDim/w; w=maxDim; } } else { if(h>maxDim){ w=w*maxDim/h; h=maxDim; } }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function memberName(id){ const m=state.members.find(x=>x.id===id); return m?m.name:'عضو محذوف'; }
function memberById(id){ return state.members.find(x=>x.id===id); }
function pairById(id){ return state.hostPairs.find(x=>x.id===id); }
function pairLabel(pairId){
  const p = pairById(pairId); if(!p) return 'غير محدد';
  return p.memberIds.map(memberName).join(' و ');
}
function intervalDays(){ return state.frequency==='weekly'?7:state.frequency==='biweekly'?14:0; }
function nextDate(iso){ return state.frequency==='monthly' ? addMonths(iso,1) : addDays(iso, intervalDays()); }
function nextOccurrenceOfWeekday(fromIso, weekday){
  let d = new Date(fromIso+'T00:00:00');
  while(d.getDay() !== weekday) d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}
function isExcluded(iso){
  return state.excludedPeriods.some(p => iso >= p.start && iso <= p.end);
}

function generateYearSchedule(){
  if(state.hostPairs.length===0){ showAlert('كوّن أزواج معازيب أولاً من تبويب الأعضاء'); return; }
  showConfirm('سيتم حذف الجدول الحالي وتوليد جدول سنة كاملة جديدة. متأكد؟', ()=>{
    state.occasions = [];
    let date = nextOccurrenceOfWeekday(state.scheduleStartDate, state.preferredWeekday);
    const endDate = addMonths(date, 12);
    let pairIdx = 0, index = 0, guard = 0;
    while(date < endDate && guard < 400){
      guard++;
      if(!isExcluded(date)){
        state.occasions.push({
          id: uid(), index, date,
          hostPairId: state.hostPairs[pairIdx % state.hostPairs.length].id,
          status:'scheduled', location:'',
          inviteType:null, inviteMessage:'', inviteSent:false, responses:{},
          cancelReason:'', apologyMessage:'',
          hasPhoto:false, photoDate:'',
          kitty:{ attendees:[], total:0, paid:{} },
          rating:{ raters:{} }
        });
        pairIdx++; index++;
      }
      date = nextDate(date);
    }
    saveState(); render();
  });
}

function upcomingOccasion(){
  return state.occasions.filter(o=>o.status==='scheduled').sort((a,b)=>a.date.localeCompare(b.date))[0] || null;
}
function getHomeOcc(){
  if(homeOccId){
    const found = state.occasions.find(o=>o.id===homeOccId);
    if(found) return found;
  }
  const up = upcomingOccasion();
  homeOccId = up ? up.id : null;
  return up;
}
function suggestedInvite(occ){
  const names = pairLabel(occ.hostPairId);
  const loc = occ.location ? ` عند ${occ.location}` : '';
  return `هلا وغلا 🌙 الليلة سهرتنا${loc}، ${names} عازمينكم، لا تخلّوننا نستناكم!`;
}
function apologyText(occ){
  const names = pairLabel(occ.hostPairId);
  const reason = occ.cancelReason ? ` بسبب ${occ.cancelReason}` : '';
  return `يا اهل الخير، نعتذر احنا (${names}) عن سهرة هالمرة${reason}، تراضوا علينا وربي يعوضكم خير 🙏`;
}

function attachLandingEvents(){
  const backToChooseBtn = document.getElementById('backToChooseBtn');
  if(backToChooseBtn){
    backToChooseBtn.addEventListener('click', ()=>{ landingMode='choose'; landingError=''; landingFoundTrip=null; render(); });
  }
  if(landingMode === 'create'){
    document.getElementById('createTripBtn').addEventListener('click', ()=>{
      const name = document.getElementById('newTripNameInput').value.trim();
      if(!name) return;
      createNewTrip(name);
    });
    setTimeout(()=>document.getElementById('newTripNameInput')?.focus(), 30);
    return;
  }
  if(landingMode === 'select'){
    const findTripBtn = document.getElementById('findTripBtn');
    const tryFind = async ()=>{
      const code = document.getElementById('tripCodeInput').value.trim();
      if(!code){ landingError='اكتب كود الطلعة'; render(); return; }
      landingError = 'جارٍ التحقق...'; render();
      const match = tripsIndex.find(t=>t.code === code);
      if(!match){ landingError='ما فيه طلعة بهذا الكود'; render(); return; }
      try{
        const res = await storageGet(tripDataKey(match.id), true);
        const data = JSON.parse(res.value);
        if(data.tripCode !== code){ landingError='ما فيه طلعة بهذا الكود'; render(); return; }
        landingFoundTrip = { id: match.id, data };
        landingMode = 'memberLogin'; landingError='';
        render();
      }catch(e){ landingError='تعذر العثور على بيانات هذي الطلعة'; render(); }
    };
    findTripBtn.addEventListener('click', tryFind);
    document.getElementById('tripCodeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryFind(); });
    setTimeout(()=>document.getElementById('tripCodeInput')?.focus(), 30);
    return;
  }
  if(landingMode === 'memberLogin'){
    const memberLoginBtn = document.getElementById('memberLoginBtn');
    const tryMemberLogin = ()=>{
      const mid = document.getElementById('memberLoginSelect').value;
      const code = document.getElementById('memberLoginCode').value.trim();
      if(!mid){ landingError='اختر اسمك أولًا'; render(); return; }
      const m = landingFoundTrip.data.members.find(x=>x.id===mid);
      if(!m || m.code !== code){ landingError='الكود الشخصي غير صحيح'; render(); return; }
      state = landingFoundTrip.data; currentTripId = landingFoundTrip.id; currentUserId = mid;
      unlocked = true; landingError=''; landingFoundTrip = null;
      render();
    };
    memberLoginBtn.addEventListener('click', tryMemberLogin);
    document.getElementById('memberLoginCode').addEventListener('keydown', e=>{ if(e.key==='Enter') tryMemberLogin(); });
    setTimeout(()=>document.getElementById('memberLoginSelect')?.focus(), 30);
    return;
  }
  const goSelectBtn = document.getElementById('goSelectBtn');
  if(goSelectBtn) goSelectBtn.addEventListener('click', ()=>{ landingMode='select'; landingError=''; render(); });
  document.getElementById('goCreateBtn').addEventListener('click', ()=>{ landingMode='create'; landingError=''; render(); });
}

      <div style="font-size:13px;color:var(--text-dim);">${occ.inviteType==='poll'?'استفتاء: هل تُقام السهرة؟':'الرسالة أُرسلت — ردّ الأعضاء:'}</div>
      <div class="pct-bar"><div class="pct-fill" style="width:${pct}%;"></div></div>
      <div style="font-size:12.5px;color:var(--text-dim);">${yes} موافق · ${no} غير موافق · من أصل ${total}</div>
      <div class="rsvp-list">
        ${state.members.map(m=>{
          const r = occ.responses[m.id];
          const cls = r==='yes'?'yes':r==='no'?'no':'pending';
          const status = r==='yes' ? 'تم الله يقويكم ✅' : r==='no' ? 'مرتبط والله ❌' : 'لم يرد بعد';
          return `<span class="rsvp-chip ${cls}">${esc(m.name)}: ${status}</span>`;
        }).join('')}
      </div>
      ${currentUserId ? `<div class="row" style="margin-top:10px;">
        <button class="sm" style="border-color:var(--green);color:var(--green);" id="rsvpYes">تم الله يقويكم ✅</button>
        <button class="sm" style="border-color:var(--red);color:var(--red);" id="rsvpNo">مرتبط والله ❌</button>
      </div>` : `<div class="empty" style="padding:6px 0;">اختر اسمك بالأعلى عشان تقدر ترد</div>`}
    </div>`;
  }
  html += `</div>`;

  if(occ.status==='scheduled'){
    html += `<div class="card">
      <h3>${icon('camera')}توثيق السهرة</h3>
      ${iAmHost ? `
      <label class="file-btn" for="photoInput">${icon('camera')}<span id="photoFileLabel">اختر صورة</span></label>
      <input type="file" accept="image/*" id="photoInput" style="display:none;">
      ${occ.hasPhoto ? `<img class="photo-preview" data-photo-key="photo:${occ.id}" alt="صورة السهرة">
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">وُثّقت بتاريخ ${fmtShort(occ.photoDate)}</div>` : ''}
      <div class="row" style="margin-top:10px;">
        <button class="primary sm" id="markDoneBtn">${icon('check')}تحديد السهرة كمنتهية</button>
      </div>` : (occ.hasPhoto ? `<img class="photo-preview" data-photo-key="photo:${occ.id}" alt="صورة السهرة">`
        : `<div class="empty" style="padding:6px 0;">لسا ما وثّق المعازيب السهرة</div>`)}
    </div>`;
  }

  if(occ.status==='done'){
    const count = occ.kitty.attendees.length;
    const share = count ? (occ.kitty.total / count) : 0;
    const paidCount = occ.kitty.attendees.filter(mid=>occ.kitty.paid[mid]).length;
    const collected = paidCount * share;
    const remaining = occ.kitty.total - collected;
    const pct = occ.kitty.total ? Math.round(collected/occ.kitty.total*100) : 0;
    html += `<div class="card">
      <h3>${icon('wallet')}محفظة الجلسة</h3>
      ${iAmHost ? `
      <div class="field">
        <label class="field-label">من حضر هالجلسة؟</label>
        <div class="row">
          ${state.members.map(m=>`<label style="display:flex;align-items:center;gap:5px;font-size:13px;">
            <input type="checkbox" class="attendeeChk" value="${m.id}" ${occ.kitty.attendees.includes(m.id)?'checked':''}> ${esc(m.name)}
          </label>`).join('')}
        </div>
      </div>
      <div class="row">
        <input type="number" id="kittyTotal" placeholder="المبلغ الإجمالي (ريال)" value="${occ.kitty.total||''}" style="max-width:180px;">
        <button class="primary sm" id="saveKittyBtn">${icon('wallet')}احسب المحفظة</button>
      </div>` : ''}
      ${count ? `
        <div class="grid2" style="margin-top:16px;gap:10px;">
          <div style="background:var(--card-2);border-radius:12px;padding:10px 12px;">
            <div style="font-size:12px;color:var(--text-dim);">الإجمالي</div>
            <div style="font-size:19px;font-weight:700;color:var(--text);">${occ.kitty.total} ريال</div>
          </div>
          <div style="background:var(--card-2);border-radius:12px;padding:10px 12px;">
            <div style="font-size:12px;color:var(--text-dim);">نصيب كل شخص (${count})</div>
            <div style="font-size:19px;font-weight:700;color:var(--accent-text);">${share.toFixed(1)} ريال</div>
          </div>
        </div>
        <div style="margin-top:14px;">
          <div class="row between" style="font-size:12.5px;color:var(--text-dim);margin-bottom:4px;">
            <span>تحصّل ${collected.toFixed(1)} ريال</span>
            <span>متبقي ${remaining.toFixed(1)} ريال</span>
          </div>
          <div class="pct-bar"><div class="pct-fill" style="width:${pct}%;"></div></div>
        </div>
        <div style="margin-top:12px;">
        ${occ.kitty.attendees.map(mid=>{
          const paid = occ.kitty.paid[mid];
          return `<div class="kitty-row">
            <span>${esc(memberName(mid))} <span style="color:var(--text-dim);font-size:12px;">— عليه ${share.toFixed(1)} ريال</span></span>
            ${paid ? `<span style="color:var(--green);font-size:13px;">تم التحويل ✅ الله يعطيك العافية</span>`
              : (currentUserId===mid ? `<button class="sm primary" data-pay="${mid}">أكّد إنك دفعت</button>` : `<span style="color:var(--text-dim);font-size:12.5px;">بانتظار الدفع</span>`)}
          </div>`;
        }).join('')}
        </div>` : (iAmHost ? `<div class="empty" style="padding:10px 0 0;">حدد الحضور والمبلغ الإجمالي وبعدين اضغط "احسب المحفظة"</div>` : `<div class="empty" style="padding:10px 0 0;">المعازيب لسا ما حسبوا المحفظة</div>`)}
    </div>

    <div class="card">
      <h3>${icon('star')}تقييم السهرة</h3>
      ${currentUserId ? renderRatingInputs(occ) : `<div class="empty" style="padding:6px 0;">اختر اسمك بالأعلى عشان تقيّم</div>`}
      ${renderRatingAverages(occ)}
    </div>`;
  }

  if(occ.status==='canceled'){
    html += `<div class="card">
      <h3>${icon('bell')}رسالة الاعتذار</h3>
      <div style="background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;">${esc(occ.apologyMessage)}</div>
      <div class="row" style="margin-top:10px;">
        <button class="sm" id="copyApologyBtn">نسخ الرسالة</button>
      </div>
    </div>`;
  }

  return html;
}

function avatarHtml(mid){
  const m = memberById(mid);
  if(!m) return `<div class="avatar sm">؟</div>`;
  if(m.hasAvatar){ return `<div class="avatar sm"><img data-photo-key="avatar:${m.id}" alt=""></div>`; }
  return `<div class="avatar sm">${esc((m.name||'؟').slice(0,1))}</div>`;
}

function renderRatingInputs(occ){
  const my = occ.rating.raters[currentUserId] || {place:0,vibe:0,food:0};
  const cats = [['place','المكان'],['vibe','الجو'],['food','الأكل']];
  return cats.map(([key,label])=>`
    <div class="row between" style="padding:4px 0;">
      <span style="font-size:13px;color:var(--text-dim);">${label}</span>
      <div class="stars" data-rate-occ="${key}">
        ${[1,2,3,4,5].map(n=>`<span class="star ${my[key]>=n?'on':''}" data-val="${n}">★</span>`).join('')}
      </div>
    </div>`).join('');
}
function renderRatingAverages(occ){
  const raters = Object.values(occ.rating.raters);
  if(raters.length===0) return `<div class="empty" style="padding:10px 0 0;">لا يوجد تقييمات بعد</div>`;
  const avg = key => (raters.reduce((s,r)=>s+(r[key]||0),0)/raters.length).toFixed(1);
  return `<div style="margin-top:10px;font-size:13px;color:var(--text-dim);border-top:1px solid var(--line);padding-top:10px;">
    المتوسط — المكان: <strong style="color:var(--accent-text);">${avg('place')}</strong> ·
    الجو: <strong style="color:var(--accent-text);">${avg('vibe')}</strong> ·
    الأكل: <strong style="color:var(--accent-text);">${avg('food')}</strong>
  </div>`;
}

/* ---------- events ---------- */
function attachContentEvents(){
  const occ = getHomeOcc();

  const locInput = document.getElementById('locInput');
  if(locInput){
    document.getElementById('saveLocBtn').addEventListener('click', ()=>{ occ.location=locInput.value; saveState(); renderContent(); });
    document.getElementById('swapBtn').addEventListener('click', ()=>{
      const rest = state.occasions.filter(o=>o.status==='scheduled' && o.id!==occ.id).sort((a,b)=>a.date.localeCompare(b.date));
      if(rest.length===0){ showAlert('لا يوجد سهرة تالية للتبديل معها'); return; }
      const nextOcc = rest[0];
      const tmp = occ.hostPairId; occ.hostPairId = nextOcc.hostPairId; nextOcc.hostPairId = tmp;
      saveState(); renderContent();
    });
  }
  const sendAnnounceBtn = document.getElementById('sendAnnounceBtn');
  if(sendAnnounceBtn){
    sendAnnounceBtn.addEventListener('click', ()=>{
      occ.inviteMessage = document.getElementById('inviteMsg').value;
      occ.inviteType='announce'; occ.inviteSent=true; occ.responses = occ.responses||{};
      saveState(); renderContent();
    });
    document.getElementById('sendPollBtn').addEventListener('click', ()=>{
      occ.inviteMessage = document.getElementById('inviteMsg').value;
      occ.inviteType='poll'; occ.inviteSent=true; occ.responses = occ.responses||{};
      saveState(); renderContent();
    });
    document.getElementById('openCancelBtn').addEventListener('click', ()=>{
      showChoice('وش تبي تسوي بسهرة هذا الأسبوع؟', [
        { label:'تراجع', action:()=>{} },
        { label:'تأجيل', action:()=>{ occ.status='postponed'; saveState(); render(); } },
        { label:'إلغاء نهائي', cls:'danger', action:()=>{
            showPrompt('سبب الإلغاء (اختياري):', '', reason=>{
              occ.status='canceled'; occ.cancelReason=reason||''; occ.apologyMessage=apologyText(occ);
              saveState(); renderContent();
            });
        }}
      ]);
    });
  }
  const rsvpYes = document.getElementById('rsvpYes');
  if(rsvpYes){
    rsvpYes.addEventListener('click', ()=>{ occ.responses[currentUserId]='yes'; saveState(); renderContent(); });
    document.getElementById('rsvpNo').addEventListener('click', ()=>{ occ.responses[currentUserId]='no'; saveState(); renderContent(); });
  }
  const photoInput = document.getElementById('photoInput');
  if(photoInput){
    photoInput.addEventListener('change', e=>{
      const file = e.target.files[0]; if(!file) return;
      resizeImage(file, 900, 0.7, dataUrl=>{
        saveImage('photo:'+occ.id, dataUrl);
        occ.hasPhoto = true; occ.photoDate = todayISO();
        saveState(); renderContent();
      });
    });
    document.getElementById('markDoneBtn').addEventListener('click', ()=>{ occ.status='done'; saveState(); renderContent(); });
  }
  const saveKittyBtn = document.getElementById('saveKittyBtn');
  if(saveKittyBtn){
    saveKittyBtn.addEventListener('click', ()=>{
      const checked = Array.from(document.querySelectorAll('.attendeeChk:checked')).map(c=>c.value);
      occ.kitty.attendees = checked;
      occ.kitty.total = parseFloat(document.getElementById('kittyTotal').value) || 0;
      checked.forEach(mid=>{ if(!(mid in occ.kitty.paid)) occ.kitty.paid[mid] = false; });
      Object.keys(occ.kitty.paid).forEach(mid=>{ if(!checked.includes(mid)) delete occ.kitty.paid[mid]; });
      saveState(); renderContent();
    });
  }
  document.querySelectorAll('[data-pay]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      occ.kitty.paid[btn.getAttribute('data-pay')] = true;
      saveState(); renderContent();
    });
  });
  document.querySelectorAll('[data-rate-occ]').forEach(group=>{
    group.querySelectorAll('.star').forEach(star=>{
      star.addEventListener('click', ()=>{
        if(!currentUserId) return;
        const key = group.getAttribute('data-rate-occ');
        const val = parseInt(star.getAttribute('data-val'));
        if(!occ.rating.raters[currentUserId]) occ.rating.raters[currentUserId] = {place:0,vibe:0,food:0};
        occ.rating.raters[currentUserId][key] = val;
        saveState(); renderContent();
      });
    });
  });
  const copyApologyBtn = document.getElementById('copyApologyBtn');
  if(copyApologyBtn){
    copyApologyBtn.addEventListener('click', ()=>{
      navigator.clipboard.writeText(occ.apologyMessage).then(()=>{
        copyApologyBtn.textContent = 'تم النسخ ✓';
        setTimeout(()=>{ copyApologyBtn.textContent = 'نسخ الرسالة'; }, 1800);
      }).catch(()=> showAlert('تعذر النسخ، انسخ الرسالة يدويًا'));
    });
  }

  document.querySelectorAll('.postponeDate').forEach(inp=>{
    inp.addEventListener('change', ()=>{});
  });
  document.querySelectorAll('[data-open-home]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      homeOccId = btn.getAttribute('data-open-home');
      currentTab = 'home';
      render();
    });
  });
  document.querySelectorAll('[data-confirm-postpone]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-confirm-postpone');
      const o = state.occasions.find(x=>x.id===id);
      const inp = document.querySelector(`.postponeDate[data-occ="${id}"]`);
      o.date = inp.value; o.status='scheduled';
      saveState(); render();
    });
  });

  const addMemberBtn = document.getElementById('addMemberBtn');
  if(addMemberBtn){
    const avatarFileInput = document.getElementById('newMemberAvatar');
    if(avatarFileInput){
      avatarFileInput.addEventListener('change', ()=>{
        const label = document.getElementById('newMemberAvatarLabel');
        if(label) label.textContent = avatarFileInput.files[0] ? avatarFileInput.files[0].name.slice(0,14) : 'صورة (اختياري)';
      });
    }
    addMemberBtn.addEventListener('click', ()=>{
      const nameInput = document.getElementById('newMemberName');
      const name = nameInput.value.trim(); if(!name) return;
      const fileInput = document.getElementById('newMemberAvatar');
      const newId = uid();
      const code = String(Math.floor(1000 + Math.random()*9000));
      const member = { id:newId, name, hasAvatar:false, code };
      state.members.push(member);
      const finish = ()=>{
        saveState(); render();
        showAlert(`تمت إضافة ${name}. كوده الخاص: ${code} — شاركه معه على الخاص عشان يسجّل دخوله باسمه.`);
      };
      if(fileInput.files[0]){
        resizeImage(fileInput.files[0], 120, 0.7, dataUrl=>{
          saveImage('avatar:'+newId, dataUrl);
          member.hasAvatar = true;
          finish();
        });
      } else finish();
    });
  }
  document.querySelectorAll('[data-rm-member]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-rm-member');
      showConfirm('حذف هذا العضو؟', ()=>{
        state.members = state.members.filter(m=>m.id!==id);
        state.hostPairs = state.hostPairs.filter(p=>!p.memberIds.includes(id));
        saveState(); render();
      });
    });
  });
  const addPairBtn = document.getElementById('addPairBtn');
  if(addPairBtn){
    addPairBtn.addEventListener('click', ()=>{
      const a = document.getElementById('pairMember1').value;
      const b = document.getElementById('pairMember2').value;
      if(!a || !b || a===b){ showAlert('اختر عضوين مختلفين'); return; }
      state.hostPairs.push({ id:uid(), memberIds:[a,b] });
      saveState(); render();
    });
  }
  document.querySelectorAll('[data-rm-pair]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.hostPairs = state.hostPairs.filter(p=>p.id!==btn.getAttribute('data-rm-pair'));
      saveState(); render();
    });
  });

  const freqSelect = document.getElementById('freqSelect');
  if(freqSelect){
    freqSelect.addEventListener('change', e=>{ state.frequency=e.target.value; saveState(); });
    document.getElementById('weekdaySelect').addEventListener('change', e=>{ state.preferredWeekday=parseInt(e.target.value); saveState(); });
    document.getElementById('startDateInput').addEventListener('change', e=>{ state.scheduleStartDate=e.target.value; saveState(); });
    document.getElementById('genScheduleBtn').addEventListener('click', generateYearSchedule);
    document.getElementById('addExclBtn').addEventListener('click', ()=>{
      const label = document.getElementById('exclLabel').value.trim() || 'فترة مستبعدة';
      const start = document.getElementById('exclStart').value;
      const end = document.getElementById('exclEnd').value;
      if(!start || !end){ showAlert('حدد تاريخ البداية والنهاية'); return; }
      state.excludedPeriods.push({ id:uid(), label, start, end });
      saveState(); render();
    });
    document.querySelectorAll('[data-rm-excl]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.excludedPeriods = state.excludedPeriods.filter(p=>p.id!==btn.getAttribute('data-rm-excl'));
        saveState(); render();
      });
    });
    document.getElementById('resetAllBtn').addEventListener('click', ()=>{
      showConfirm('هذا سيمسح كل بيانات هذي الطلعة نهائيًا. متأكد؟', ()=>{
        const keepName = state.tripName;
        state = blankTripState(keepName); currentUserId=null; homeOccId=null; saveState(); render();
        const idxEntry = tripsIndex.find(t=>t.id===currentTripId);
        if(idxEntry){ idxEntry.code = state.tripCode; saveTripsIndex(); }
        showAlert(`تم التصفير. كود الدخول الجديد: ${state.tripCode}`);
      });
    });
    const switchTripBtn = document.getElementById('switchTripBtn');
    if(switchTripBtn){ switchTripBtn.addEventListener('click', switchTrip); }
    const regenCodeBtn = document.getElementById('regenCodeBtn');
    if(regenCodeBtn){
      regenCodeBtn.addEventListener('click', ()=>{
        showConfirm('توليد كود جديد يلغي الكود القديم فورًا لأي شخص ما دخل بعد. متأكد؟', ()=>{
          state.tripCode = genTripCode();
          saveState(); render();
          const idxEntry = tripsIndex.find(t=>t.id===currentTripId);
          if(idxEntry){ idxEntry.code = state.tripCode; saveTripsIndex(); }
          showAlert('الكود الجديد: ' + state.tripCode);
        });
      });
    }
  }

  const goNextBtn = document.getElementById('goNextBtn');
  if(goNextBtn){
    goNextBtn.addEventListener('click', ()=>{ homeOccId = null; renderContent(); });
  }

  const addRestBtn = document.getElementById('addRestBtn');
  if(addRestBtn){
    addRestBtn.addEventListener('click', ()=>{
      const name = document.getElementById('newRestName').value.trim(); if(!name) return;
      const phone = document.getElementById('newRestPhone').value.trim();
      const notes = document.getElementById('newRestNotes').value.trim();
      state.restaurants.push({ id:uid(), name, phone, notes, ratings:[] });
      saveState(); render();
    });
  }
  document.querySelectorAll('[data-rate-restaurant]').forEach(group=>{
    group.querySelectorAll('.star').forEach(star=>{
      star.addEventListener('click', ()=>{
        if(!currentUserId){ showAlert('اختر اسمك أولاً من الأعلى'); return; }
        const rid = group.getAttribute('data-rate-restaurant');
        const r = state.restaurants.find(x=>x.id===rid);
        const val = parseInt(star.getAttribute('data-val'));
        const existing = r.ratings.find(x=>x.memberId===currentUserId);
        if(existing) existing.stars = val; else r.ratings.push({ memberId: currentUserId, stars: val });
        saveState(); render();
      });
    });
  });
}

function hydrateImages(){
  document.querySelectorAll('img[data-photo-key]').forEach(async img=>{
    const key = img.getAttribute('data-photo-key');
    const url = await fetchImage(key);
    if(url) img.src = url;
  });
}

loadApp();
</script>
</body>
</html>
